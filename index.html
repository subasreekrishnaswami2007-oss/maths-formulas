<!DOCTYPE html>
<html>
<head>
    <title>Maths Formulas</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f0f8ff;
            text-align: center;
        }
        .box {
            background: white;
            margin: 20px;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>Maths Formulas</h1>

<div class="box">
    <h2>Algebra</h2>
    <p>(a + b)² = a² + 2ab + b²</p>
</div>

<div class="box">
    <h2>Trigonometry</h2>
    <p>sin²θ + cos²θ = 1</p>
</div>

<div class="box">
    <h2>Calculus</h2>
    <p>d/dx (x²) = 2x</p>
</div>

</body>
</html>
