<!DOCTYPE html>
<html>
<head>
<title>Maths Formulas</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #74ebd5, #ACB6E5);
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.box {
  background: white;
  margin: 20px auto;
  padding: 20px;
  width: 60%;
  border-radius: 10px;
  box-shadow: 0 0 10px gray;
}
</style>

</head>

<body>

<h1>📘 Maths Formulas</h1>

<div class="box">
<h2>Algebra</h2>
<p>(a + b)² = a² + 2ab + b²</p>
</div>

<div class="box">
<h2>Trigonometry</h2>
<p>sin²θ + cos²θ = 1</p>
</div>

<div class="box">
<h2>Calculus</h2>
<p>d/dx (x²) = 2x</p>
</div>

</body>
</html>
